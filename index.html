<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Magic Gift Box ✨</title>
    <meta name="referrer" content="no-referrer">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Confetti & Effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 30%, #ffdde1, #ee9ca7);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
            overflow-x: hidden;
            padding: 20px;
        }

        /* लोडिंग स्पिनर */
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #d32f2f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* मुख्य सीन */
        .scene {
            width: 260px;
            height: 260px;
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            margin: 80px auto 30px;
            transition: transform 0.5s ease;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(-5deg) rotateY(-10deg); }
            50% { transform: translateY(-15px) rotateX(-3deg) rotateY(-12deg); }
        }
        .scene:hover {
            transform: scale(1.02) rotateX(-2deg) rotateY(-8deg);
        }

        /* क्यूब */
        .cube {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(-15deg) rotateY(-25deg);
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cube__face {
            position: absolute;
            width: 260px;
            height: 260px;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.3), 0 10px 20px rgba(0,0,0,0.2);
            background-size: cover;
            transition: all 0.5s;
        }
        .cube__face--front { transform: rotateY(0deg) translateZ(130px); }
        .cube__face--right { transform: rotateY(90deg) translateZ(130px); }
        .cube__face--back { transform: rotateY(180deg) translateZ(130px); }
        .cube__face--left { transform: rotateY(-90deg) translateZ(130px); }
        .cube__face--top { transform: rotateX(90deg) translateZ(130px); }
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(130px); }

        /* खुला हुआ बॉक्स */
        .scene.open .cube {
            transform: rotateX(-30deg) rotateY(-30deg);
        }
        .scene.open .cube__face--top {
            transform: rotateX(160deg) translateZ(130px);
            opacity: 0.9;
        }

        /* कंटेंट कार्ड */
        .content-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(0) scale(0);
            width: 300px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 4px rgba(255,215,0,0.5);
            text-align: center;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
            z-index: 200;
            border: 2px solid gold;
        }
        .scene.open .content-card {
            transform: translate(-50%, -150%) translateZ(150px) scale(1);
        }

        .sender-name {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, #d32f2f, #f06292);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .gift-image {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 20px;
            margin: 15px 0;
            background: #f9f9f9;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .message-text {
            font-size: 1.2rem;
            color: #333;
            background: rgba(255,255,240,0.7);
            padding: 15px;
            border-radius: 50px;
            font-style: italic;
            border-left: 4px solid #d32f2f;
        }

        /* लेवल के अनुसार रंग (बेहतर ग्रेडिएंट) */
        .lvl-1 .cube__face { background: linear-gradient(145deg, #e53935, #b71c1c); }
        .lvl-2 .cube__face { background: linear-gradient(145deg, #FFD700, #FFA000); }
        .lvl-3 .cube__face { background: linear-gradient(145deg, #0a0a0a, #1a1a1a); border: 2px solid #00E5FF; box-shadow: 0 0 30px #00E5FF; }
        .lvl-4 .cube__face { background: linear-gradient(145deg, #E91E63, #C2185B); }
        .lvl-5 .cube__face { background: linear-gradient(145deg, #424242, #212121); }
        .lvl-6 .cube__face { background: linear-gradient(145deg, #8B6B61, #5D4037); }
        .lvl-7 .cube__face { background: linear-gradient(145deg, #3f51b5, #9c27b0); }
        .lvl-8 .cube__face { background: linear-gradient(145deg, #E0F7FA, #B2EBF2); border: 1px solid #fff; }
        .lvl-9 .cube__face { background: linear-gradient(145deg, #f44336, #ff9800, #ffeb3b, #4caf50, #2196f3, #3f51b5, #9c27b0); }
        .lvl-10 .cube__face { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border: 2px solid white; box-shadow: 0 0 50px rgba(255,255,255,0.5); }

        /* टैप टेक्स्ट */
        .tap-hint {
            font-size: 1.3rem;
            color: white;
            background: #d32f2f;
            padding: 12px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            font-weight: 600;
            margin-top: 40px;
            animation: pulse 2s infinite;
            cursor: pointer;
            border: 2px solid gold;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 30px rgba(211,47,47,0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        }

        /* फुटर */
        .footer {
            color: white;
            text-shadow: 1px 1px 2px black;
            margin-top: 30px;
            font-size: 0.9rem;
        }

        /* रिस्पॉन्सिव */
        @media (max-width: 500px) {
            .scene { width: 200px; height: 200px; }
            .cube__face { width: 200px; height: 200px; }
            .cube__face--front { transform: rotateY(0deg) translateZ(100px); }
            .cube__face--right { transform: rotateY(90deg) translateZ(100px); }
            .cube__face--back { transform: rotateY(180deg) translateZ(100px); }
            .cube__face--left { transform: rotateY(-90deg) translateZ(100px); }
            .cube__face--top { transform: rotateX(90deg) translateZ(100px); }
            .cube__face--bottom { transform: rotateX(-90deg) translateZ(100px); }
            .content-card { width: 240px; }
            .sender-name { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <!-- लोडिंग स्क्रीन -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- 3D सीन -->
    <div class="scene" id="scene" onclick="openGift()">
        <div class="cube lvl-1" id="boxCube">
            <div class="cube__face cube__face--front"></div>
            <div class="cube__face cube__face--back"></div>
            <div class="cube__face cube__face--right"></div>
            <div class="cube__face cube__face--left"></div>
            <div class="cube__face cube__face--top"></div>
            <div class="cube__face cube__face--bottom"></div>
        </div>
        <div class="content-card">
            <div class="sender-name" id="sender">From: ...</div>
            <img class="gift-image" id="giftImg" src="" alt="Gift Photo" referrerpolicy="no-referrer" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4213/4213958.png'">
            <div class="message-text" id="message">...</div>
        </div>
    </div>

    <!-- टैप करने का इशारा -->
    <div class="tap-hint" onclick="openGift()">👉 टैप करें 👈</div>

    <!-- फुटर (वैकल्पिक) -->
    <div class="footer">❤️ जोश लव – आपके लिए ❤️</div>

    <script>
        // Firebase Config (आपका ही दिया हुआ)
        const firebaseConfig = {
            apiKey: "AIzaSyB24SehaHDOLuwzTLCkgCwXSpa6dVzrMOw",
            authDomain: "josh-de7d4.firebaseapp.com",
            databaseURL: "https://josh-de7d4-default-rtdb.firebaseio.com",
            projectId: "josh-de7d4",
            storageBucket: "josh-de7d4.firebasestorage.app",
            messagingSenderId: "1036207436233",
            appId: "1:1036207436233:web:59aa121374c9a89d4e3818",
            measurementId: "G-BC157TM372"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Get gift ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const giftId = urlParams.get('id');

        // अगर ID है तो डेटा लोड करो
        if (giftId) {
            db.ref('Gifts/' + giftId).once('value').then(snapshot => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('sender').innerText = 'From: ' + (data.sender || 'गुप्तचर 💌');
                    document.getElementById('message').innerText = data.message || 'कोई संदेश नहीं 😊';

                    // इमेज प्रॉक्सी से लोड (CORS से बचने के लिए)
                    if (data.photo && !data.photo.includes('flaticon')) {
                        document.getElementById('giftImg').src = 'https://wsrv.nl/?url=' + encodeURIComponent(data.photo) + '&w=500&output=jpg';
                    } else {
                        document.getElementById('giftImg').src = 'https://cdn-icons-png.flaticon.com/512/4213/4213958.png';
                    }

                    // बॉक्स का लेवल सेट करो
                    const level = data.boxLevel || 1;
                    document.getElementById('boxCube').className = 'cube lvl-' + level;
                } else {
                    document.getElementById('sender').innerText = 'From: कोई गिफ्ट नहीं';
                }
                // लोडिंग हटाओ
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            }).catch(error => {
                console.error('Firebase error:', error);
                document.getElementById('loading').style.display = 'none';
                alert('डेटा लोड करने में समस्या हुई।');
            });
        } else {
            // अगर URL में ID नहीं है
            document.getElementById('sender').innerText = 'From: ?';
            document.getElementById('loading').style.display = 'none';
        }

        // बॉक्स खोलने का फंक्शन (सिर्फ एक बार)
        let isOpen = false;
        function openGift() {
            if (isOpen) return;
            isOpen = true;

            const scene = document.getElementById('scene');
            scene.classList.add('open');

            // कन्फेटी बरसाओ
            confetti({
                particleCount: 120,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#d32f2f', '#ffb300', '#f06292', '#ffffff', '#ffd700']
            });

            // थोड़ी देर बाद और कन्फेटी
            setTimeout(() => {
                confetti({
                    particleCount: 60,
                    spread: 100,
                    origin: { y: 0.5, x: 0.2 }
                });
                confetti({
                    particleCount: 60,
                    spread: 100,
                    origin: { y: 0.5, x: 0.8 }
                });
            }, 200);

            // छोटे दिलों की बौछार (extra effect)
            const duration = 1000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff0000', '#ff69b4']
                });
                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff0000', '#ff69b4']
                });
                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
