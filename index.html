<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Gift ❤️</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            perspective: 1200px;
        }
        .bg-heart { position: absolute; color: rgba(255, 255, 255, 0.6); font-size: 2rem; animation: floatUp 8s infinite linear; z-index: -1; }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
        .scene {
            width: 200px; height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s;
            cursor: pointer;
        }
        .cube {
            width: 100%; height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(-30deg);
            transition: transform 1s;
        }
        .cube__face {
            position: absolute; width: 200px; height: 200px;
            border: 2px solid #b71c1c;
            background: rgba(211, 47, 47, 0.95);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .cube__face--front  { transform: rotateY(  0deg) translateZ(100px); }
        .cube__face--right  { transform: rotateY( 90deg) translateZ(100px); }
        .cube__face--back   { transform: rotateY(180deg) translateZ(100px); }
        .cube__face--left   { transform: rotateY(-90deg) translateZ(100px); }
        .cube__face--top    { transform: rotateX( 90deg) translateZ(100px); background: #c62828; }
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(100px); background: #8e0000; }
        .ribbon { position: absolute; background: #FFD700; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
        .ribbon-v { width: 40px; height: 100%; left: 80px; top: 0; }
        .ribbon-h { width: 100%; height: 40px; top: 80px; left: 0; }
        .scene.open .cube__face--top {
            transform: rotateX(150deg) translateZ(100px);
            opacity: 0.8; transition: transform 1s;
        }
        .content-card {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(0) scale(0);
            width: 260px; background: white; padding: 15px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center; opacity: 0;
            transition: all 1s ease 0.5s; z-index: 100; border: 4px solid #d32f2f;
        }
        .scene.open .content-card {
            transform: translate(-50%, -120%) translateZ(150px) scale(1);
            opacity: 1;
        }
        .content-card img {
            width: 100%; max-height: 200px; object-fit: cover;
            border-radius: 10px; margin-bottom: 10px; border: 2px solid #eee;
        }
        .content-card h3 { margin: 5px 0; color: #d32f2f; font-size: 18px; }
        .content-card p { font-size: 14px; color: #333; line-height: 1.4; }
        .instruction {
            margin-top: 150px; font-size: 1.2rem; color: #d32f2f;
            font-weight: bold; animation: bounce 2s infinite;
            background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 30px;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; color: #d32f2f; font-size: 20px; }
    </style>
</head>
<body>

    <div id="loading">
        <div style="font-size: 50px; margin-bottom: 20px;">🎁</div>
        Preparing Surprise...
    </div>

    <div class="bg-heart" style="left: 10%; animation-duration: 6s;">❤️</div>
    <div class="bg-heart" style="left: 30%; animation-duration: 8s;">💖</div>
    <div class="bg-heart" style="left: 70%; animation-duration: 5s;">💕</div>

    <div class="scene" id="scene" onclick="openGift()">
        <div class="cube">
            <div class="cube__face cube__face--front"><div class="ribbon ribbon-v"></div><div class="ribbon ribbon-h"></div></div>
            <div class="cube__face cube__face--back"></div>
            <div class="cube__face cube__face--right"></div>
            <div class="cube__face cube__face--left"></div>
            <div class="cube__face cube__face--top"><div class="ribbon ribbon-v"></div><div class="ribbon ribbon-h"></div></div>
            <div class="cube__face cube__face--bottom"></div>
        </div>
        <div class="content-card">
            <h3 id="sender">From: Secret</h3>
            <img id="giftImg" src="" alt="Gift Photo">
            <p id="message">You have a surprise!</p>
        </div>
    </div>
    <div class="instruction" id="tapText">Tap to Open! 👆</div>

    <script>
        // ============================================
        // 🔴 PASTE YOUR FIREBASE CONFIG HERE CAREFULLY
        // ============================================
        const firebaseConfig = {
    apiKey: "AIzaSyB24SehaHDOLuwzTLCkgCwXSpa6dVzrMOw",
    authDomain: "josh-de7d4.firebaseapp.com",
    databaseURL: "https://josh-de7d4-default-rtdb.firebaseio.com",
    projectId: "josh-de7d4",
    storageBucket: "josh-de7d4.firebasestorage.app",
    messagingSenderId: "1036207436233",
    appId: "1:1036207436233:web:59aa121374c9a89d4e3818",
    measurementId: "G-BC157TM372"
  };
        // ============================================

        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            const urlParams = new URLSearchParams(window.location.search);
            const giftId = urlParams.get('id');

            if (giftId) {
                db.ref('Gifts/' + giftId).once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        document.getElementById('sender').innerText = "From: " + data.sender;
                        document.getElementById('message').innerText = data.message;
                        document.getElementById('giftImg').src = data.photo;
                        document.getElementById('loading').style.display = 'none';
                    } else {
                        document.getElementById('loading').innerHTML = "Gift not found! 😢";
                    }
                });
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('message').innerText = "Open via App Link!";
            }
        } catch (e) {
            alert("Firebase Config Error!");
        }

        let opened = false;
        function openGift() {
            if (opened) return;
            opened = true;
            document.getElementById('scene').classList.add('open');
            document.getElementById('tapText').style.display = 'none';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
