<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ MAGIC GIFT BOX ✨</title>
    <meta name="referrer" content="no-referrer">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Confetti & Effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b1b3a, #1a0f2a);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }

        /* स्टार्स इफेक्ट */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 80px 120px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 160px 50px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
            pointer-events: none;
        }

        /* लोडिंग स्पिनर */
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 5, 20, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
            transition: opacity 0.5s;
        }
        .spinner {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(255,215,0,0.3);
            border-top: 5px solid gold;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px gold;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* मुख्य सीन */
        .scene {
            width: 280px;
            height: 280px;
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
            margin: 100px auto 40px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
            animation: levitate 5s ease-in-out infinite;
        }
        @keyframes levitate {
            0%, 100% { transform: translateY(0) rotateX(-5deg) rotateY(-10deg); }
            50% { transform: translateY(-20px) rotateX(-3deg) rotateY(-15deg); }
        }

        /* क्यूब */
        .cube {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(-15deg) rotateY(-25deg);
            transition: transform 1s cubic-bezier(0.34, 1.3, 0.64, 1);
        }
        .cube__face {
            position: absolute;
            width: 280px;
            height: 280px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 50px rgba(255,255,255,0.3), 0 15px 25px rgba(0,0,0,0.5);
            background-size: cover;
            transition: all 0.5s;
            border-radius: 8px;
        }
        .cube__face--front { transform: rotateY(0deg) translateZ(140px); }
        .cube__face--right { transform: rotateY(90deg) translateZ(140px); }
        .cube__face--back { transform: rotateY(180deg) translateZ(140px); }
        .cube__face--left { transform: rotateY(-90deg) translateZ(140px); }
        .cube__face--top { transform: rotateX(90deg) translateZ(140px); }
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(140px); }

        /* खुला हुआ बॉक्स */
        .scene.open .cube {
            transform: rotateX(-30deg) rotateY(-35deg);
        }
        .scene.open .cube__face--top {
            transform: rotateX(160deg) translateZ(140px);
            opacity: 0.9;
            box-shadow: 0 -20px 30px rgba(0,0,0,0.6);
        }

        /* कंटेंट कार्ड – शानदार ग्लास इफेक्ट */
        .content-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(0) scale(0);
            width: 320px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,215,0,0.5), 0 0 30px gold;
            text-align: center;
            transition: all 0.9s cubic-bezier(0.34, 1.5, 0.64, 1) 0.3s;
            z-index: 200;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .scene.open .content-card {
            transform: translate(-50%, -160%) translateZ(160px) scale(1);
        }

        .sender-name {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF69B4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .gift-image {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 25px;
            margin: 15px 0;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.3);
            border: 2px solid gold;
        }
        .message-text {
            font-size: 1.3rem;
            color: #fff;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            padding: 15px 20px;
            border-radius: 50px;
            font-style: italic;
            border-left: 5px solid gold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* प्रोफेशनल लेवल स्टाइल – हर एक यूनिक */
        .lvl-1 .cube__face { 
            background: linear-gradient(145deg, #d32f2f, #b71c1c);
            position: relative;
            overflow: hidden;
        }
        .lvl-1 .cube__face::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
            animation: shine 4s infinite;
        }

        .lvl-2 .cube__face { 
            background: linear-gradient(145deg, #FFD700, #FF8C00);
            box-shadow: 0 0 30px #FFD700;
        }
        .lvl-2 .cube__face::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.2) 0px, rgba(255,255,255,0.2) 10px, transparent 10px, transparent 20px);
        }

        .lvl-3 .cube__face { 
            background: linear-gradient(145deg, #0a0a0a, #1a1a1a);
            border: 2px solid #00E5FF;
            box-shadow: 0 0 40px #00E5FF, inset 0 0 20px #00E5FF;
        }
        .lvl-3 .cube__face::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 30% 30%, #00E5FF, transparent 70%);
            opacity: 0.3;
        }

        .lvl-4 .cube__face { 
            background: linear-gradient(145deg, #E91E63, #C2185B);
            box-shadow: 0 0 30px #ff80ab;
        }
        .lvl-4 .cube__face::after {
            content: '❤️';
            position: absolute;
            font-size: 30px;
            opacity: 0.1;
            transform: rotate(45deg);
            top: 20px; left: 20px;
        }

        .lvl-5 .cube__face { 
            background: linear-gradient(145deg, #616161, #212121);
            border: 1px solid #9e9e9e;
            box-shadow: 0 0 30px #616161;
        }
        .lvl-5 .cube__face::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #424242 25%, #757575 25%, #757575 50%, #424242 50%, #424242 75%, #757575 75%);
            background-size: 20px 20px;
            opacity: 0.3;
        }

        .lvl-6 .cube__face { 
            background: linear-gradient(145deg, #8B6B61, #5D4037);
            box-shadow: 0 0 20px #8B6B61;
        }
        .lvl-6 .cube__face::after {
            content: '🌲';
            font-size: 40px;
            opacity: 0.1;
            position: absolute;
            bottom: 10px; right: 10px;
        }

        .lvl-7 .cube__face { 
            background: linear-gradient(145deg, #3f51b5, #9c27b0, #3f51b5);
            background-size: 200% 200%;
            animation: galaxy 10s ease infinite;
        }
        @keyframes galaxy {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .lvl-7 .cube__face::after {
            content: '✨';
            font-size: 30px;
            opacity: 0.3;
            position: absolute;
            top: 20px; left: 20px;
        }

        .lvl-8 .cube__face { 
            background: linear-gradient(145deg, #E0F7FA, #B2EBF2);
            border: 2px solid #fff;
            box-shadow: 0 0 30px #fff, inset 0 0 20px #fff;
        }
        .lvl-8 .cube__face::after {
            content: '💎';
            font-size: 40px;
            opacity: 0.3;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .lvl-9 .cube__face { 
            background: linear-gradient(135deg, red, orange, yellow, green, blue, indigo, violet, red);
            background-size: 400% 400%;
            animation: rainbow 8s linear infinite;
        }
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        .lvl-10 .cube__face { 
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 0 50px rgba(255,255,255,0.5), inset 0 0 30px rgba(255,255,255,0.3);
        }
        .lvl-10 .cube__face::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: inherit;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        /* शाइन एनिमेशन */
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        /* टैप हिंट */
        .tap-hint {
            font-size: 1.5rem;
            color: white;
            background: linear-gradient(45deg, #d32f2f, #c2185b);
            padding: 15px 40px;
            border-radius: 60px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 0 3px gold, 0 0 30px gold;
            letter-spacing: 2px;
            font-weight: 700;
            margin-top: 50px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            text-transform: uppercase;
            animation: glowPulse 2s infinite;
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 0 3px gold, 0 0 30px gold; }
            50% { box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 5px gold, 0 0 60px gold; }
            100% { box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 0 3px gold, 0 0 30px gold; }
        }
        .tap-hint:hover {
            transform: scale(1.05);
        }

        /* रिस्पॉन्सिव */
        @media (max-width: 500px) {
            .scene { width: 220px; height: 220px; margin-top: 70px; }
            .cube__face { width: 220px; height: 220px; }
            .cube__face--front { transform: rotateY(0deg) translateZ(110px); }
            .cube__face--right { transform: rotateY(90deg) translateZ(110px); }
            .cube__face--back { transform: rotateY(180deg) translateZ(110px); }
            .cube__face--left { transform: rotateY(-90deg) translateZ(110px); }
            .cube__face--top { transform: rotateX(90deg) translateZ(110px); }
            .cube__face--bottom { transform: rotateX(-90deg) translateZ(110px); }
            .content-card { width: 260px; padding: 20px; }
            .sender-name { font-size: 1.8rem; }
            .tap-hint { font-size: 1.2rem; padding: 12px 30px; }
        }
    </style>
</head>
<body>
    <!-- लोडिंग स्क्रीन -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- 3D सीन -->
    <div class="scene" id="scene" onclick="openGift()">
        <div class="cube lvl-1" id="boxCube">
            <div class="cube__face cube__face--front"></div>
            <div class="cube__face cube__face--back"></div>
            <div class="cube__face cube__face--right"></div>
            <div class="cube__face cube__face--left"></div>
            <div class="cube__face cube__face--top"></div>
            <div class="cube__face cube__face--bottom"></div>
        </div>
        <div class="content-card">
            <div class="sender-name" id="sender">From: ...</div>
            <img class="gift-image" id="giftImg" src="" alt="Gift Photo" referrerpolicy="no-referrer" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4213/4213958.png'">
            <div class="message-text" id="message">...</div>
        </div>
    </div>

    <!-- टैप करने का बटन -->
    <button class="tap-hint" onclick="openGift()">👉 OPEN GIFT 👈</button>

    <script>
        // Firebase Config (आपका अपना)
        const firebaseConfig = {
            apiKey: "AIzaSyB24SehaHDOLuwzTLCkgCwXSpa6dVzrMOw",
            authDomain: "josh-de7d4.firebaseapp.com",
            databaseURL: "https://josh-de7d4-default-rtdb.firebaseio.com",
            projectId: "josh-de7d4",
            storageBucket: "josh-de7d4.firebasestorage.app",
            messagingSenderId: "1036207436233",
            appId: "1:1036207436233:web:59aa121374c9a89d4e3818",
            measurementId: "G-BC157TM372"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Get gift ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const giftId = urlParams.get('id');

        // अगर ID है तो डेटा लोड करो
        if (giftId) {
            db.ref('Gifts/' + giftId).once('value').then(snapshot => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('sender').innerText = 'From: ' + (data.sender || 'Secret Admirer');
                    document.getElementById('message').innerText = data.message || 'No message 😊';

                    // इमेज प्रॉक्सी से लोड
                    if (data.photo && !data.photo.includes('flaticon')) {
                        document.getElementById('giftImg').src = 'https://wsrv.nl/?url=' + encodeURIComponent(data.photo) + '&w=500&output=jpg';
                    } else {
                        document.getElementById('giftImg').src = 'https://cdn-icons-png.flaticon.com/512/4213/4213958.png';
                    }

                    // बॉक्स का लेवल सेट करो
                    const level = data.boxLevel || 1;
                    document.getElementById('boxCube').className = 'cube lvl-' + level;
                } else {
                    document.getElementById('sender').innerText = 'From: Gift not found';
                }
                // लोडिंग हटाओ
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            }).catch(error => {
                console.error('Firebase error:', error);
                document.getElementById('loading').style.display = 'none';
                alert('Error loading gift data.');
            });
        } else {
            document.getElementById('sender').innerText = 'From: ?';
            document.getElementById('loading').style.display = 'none';
        }

        // बॉक्स खोलने का फंक्शन
        let isOpen = false;
        function openGift() {
            if (isOpen) return;
            isOpen = true;

            const scene = document.getElementById('scene');
            scene.classList.add('open');

            // बड़ी कन्फेटी
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#FFD700', '#FFA500', '#FF69B4', '#00E5FF', '#FF0000']
            });

            // दिलों की बारिश
            const duration = 1500;
            const end = Date.now() + duration;
            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.5 },
                    colors: ['#ff0000', '#ff69b4', '#ff1493']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.5 },
                    colors: ['#ff0000', '#ff69b4', '#ff1493']
                });
                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // थोड़ी देर बाद और कन्फेटी
            setTimeout(() => {
                confetti({
                    particleCount: 100,
                    spread: 80,
                    origin: { y: 0.5 }
                });
            }, 300);
        }
    </script>
</body>
</html>
