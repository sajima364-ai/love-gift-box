<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Gift 🎁</title>
    <meta name="referrer" content="no-referrer">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { margin: 0; background: radial-gradient(circle, #ff9a9e, #fecfef); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; perspective: 1200px; overflow: hidden; }
        .scene { width: 250px; height: 250px; position: relative; transform-style: preserve-3d; transition: transform 1s; cursor: pointer; margin-top: 50px; }
        .cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transform: rotateX(-20deg) rotateY(-30deg); transition: transform 1s; }
        .cube__face { position: absolute; width: 250px; height: 250px; border: 2px solid rgba(0,0,0,0.1); box-shadow: inset 0 0 30px rgba(0,0,0,0.2); }
        .cube__face--front { transform: rotateY(0deg) translateZ(125px); }
        .cube__face--right { transform: rotateY(90deg) translateZ(125px); }
        .cube__face--back { transform: rotateY(180deg) translateZ(125px); }
        .cube__face--left { transform: rotateY(-90deg) translateZ(125px); }
        .cube__face--top { transform: rotateX(90deg) translateZ(125px); }
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(125px); }
        
        .scene.open .cube__face--top { transform: rotateX(150deg) translateZ(125px); opacity: 0.8; transition: transform 1s; }
        .content-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) translateZ(0) scale(0); width: 280px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; transition: all 1s ease 0.5s; z-index: 100; border: 4px solid #d32f2f; }
        .scene.open .content-card { transform: translate(-50%, -130%) translateZ(150px) scale(1); }
        .content-card img { width: 100%; max-height: 280px; object-fit: contain; border-radius: 10px; margin: 10px 0; background: #f0f0f0; }
        
        /* --- 10 LEVELS STYLES --- */
        .lvl-1 .cube__face { background: #e53935; border-color: #b71c1c; } .lvl-1 .cube__face--top { background: #c62828; }
        .lvl-2 .cube__face { background: linear-gradient(45deg, #FFD700, #FFA000); } .lvl-2 .cube__face--top { background: #FFC107; }
        .lvl-3 .cube__face { background: #000; border: 2px solid #00E5FF; box-shadow: 0 0 15px #00E5FF; } .lvl-3 .cube__face--top { background: #00BCD4; }
        .lvl-4 .cube__face { background: #E91E63; } .lvl-4 .cube__face--top { background: #C2185B; }
        .lvl-5 .cube__face { background: #212121; } .lvl-5 .cube__face--top { background: #000; }
        .lvl-6 .cube__face { background: #795548; } .lvl-6 .cube__face--top { background: #5D4037; }
        .lvl-7 .cube__face { background: linear-gradient(to right, #3f51b5, #9c27b0); } .lvl-7 .cube__face--top { background: #303F9F; }
        .lvl-8 .cube__face { background: #E0F7FA; border: 1px solid #FFF; } .lvl-8 .cube__face--top { background: #B2EBF2; }
        .lvl-9 .cube__face { background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet); } 
        .lvl-10 .cube__face { background: rgba(255,255,255,0.3); border: 1px solid white; backdrop-filter: blur(5px); } /* Glass */

    </style>
</head>
<body>
    <div id="loading" style="font-size:30px; font-weight:bold; color:#d32f2f;">Loading...</div>
    <div class="scene" id="scene" onclick="openGift()">
        <div class="cube lvl-1" id="boxCube">
            <div class="cube__face cube__face--front"></div><div class="cube__face cube__face--back"></div>
            <div class="cube__face cube__face--right"></div><div class="cube__face cube__face--left"></div>
            <div class="cube__face cube__face--top"></div><div class="cube__face cube__face--bottom"></div>
        </div>
        <div class="content-card">
            <h3 id="sender">From: ...</h3>
            <img id="giftImg" src="" alt="Photo" referrerpolicy="no-referrer" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4213/4213958.png'">
            <p id="message">...</p>
        </div>
    </div>
    <div style="margin-top:200px; font-weight:bold; color:white; background:red; padding:10px 20px; border-radius:30px;">Tap Box 👆</div>

    <script>
        const firebaseConfig = {
    apiKey: "AIzaSyB24SehaHDOLuwzTLCkgCwXSpa6dVzrMOw",
    authDomain: "josh-de7d4.firebaseapp.com",
    databaseURL: "https://josh-de7d4-default-rtdb.firebaseio.com",
    projectId: "josh-de7d4",
    storageBucket: "josh-de7d4.firebasestorage.app",
    messagingSenderId: "1036207436233",
    appId: "1:1036207436233:web:59aa121374c9a89d4e3818",
    measurementId: "G-BC157TM372"
  };

        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            const id = new URLSearchParams(window.location.search).get('id');

            if (id) {
                db.ref('Gifts/' + id).once('value').then(s => {
                    if (s.exists()) {
                        const d = s.val();
                        document.getElementById('sender').innerText = "From: " + (d.sender || "Secret");
                        document.getElementById('message').innerText = d.message;
                        
                        if (d.photo && !d.photo.includes("flaticon")) {
                            document.getElementById('giftImg').src = "https://wsrv.nl/?url=" + encodeURIComponent(d.photo) + "&w=500&output=jpg";
                        } else {
                            document.getElementById('giftImg').src = "https://cdn-icons-png.flaticon.com/512/4213/4213958.png";
                        }

                        const level = d.boxLevel || 1;
                        document.getElementById('boxCube').className = "cube lvl-" + level;

                        document.getElementById('loading').style.display = 'none';
                    }
                });
            }
        } catch (e) { alert("Config Error"); }

        let open=false;
        function openGift(){ if(open)return; open=true; document.querySelector('.scene').classList.add('open'); confetti({particleCount:100, spread:70, origin:{y:0.6}}); }
    </script>
</body>
</html>
