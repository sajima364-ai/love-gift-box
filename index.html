<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Premium Magic Gift Box ✨</title>
    <meta name="referrer" content="no-referrer">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #ffe4e1, #ffb6c1);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1200px; /* 3D Depth */
        }

        /* Loading Spinner */
        .loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.5s;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #ffe4e1; border-top: 5px solid #ff3366;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 3D Scene Container */
        .scene {
            width: 200px; height: 200px;
            position: relative;
            transform-style: preserve-3d;
            margin-top: 50px;
        }

        /* Floor Shadow */
        .shadow {
            position: absolute;
            bottom: -50px; left: 50%;
            width: 160px; height: 40px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            transform: translateX(-50%) rotateX(70deg);
            filter: blur(8px);
            animation: shadowPulse 3s ease-in-out infinite;
            transition: all 0.5s;
        }
        .scene.open .shadow { opacity: 0.1; width: 200px; }

        @keyframes shadowPulse {
            0%, 100% { transform: translateX(-50%) rotateX(70deg) scale(1); }
            50% { transform: translateX(-50%) rotateX(70deg) scale(0.8); opacity: 0.15; }
        }

        /* The Gift Box Wrapper */
        .gift-box {
            width: 160px; height: 160px;
            position: absolute;
            top: 50%; left: 50%;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%) rotateX(-20deg) rotateY(-35deg);
            cursor: pointer;
            animation: floatBox 3s ease-in-out infinite;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .gift-box:hover { transform: translate(-50%, -50%) rotateX(-15deg) rotateY(-20deg) scale(1.05); }

        @keyframes floatBox {
            0%, 100% { top: 50%; }
            50% { top: 46%; }
        }

        /* Common Face Styles */
        .face {
            position: absolute;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(0,0,0,0.1);
            transform-style: preserve-3d;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
        }

        /* Ribbon Effect (Using Pseudo Elements) */
        .face::before, .face::after {
            content: ''; position: absolute; background: linear-gradient(to right, #FFD700, #FFA500, #FFD700);
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        .face::before { width: 24px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); } /* Vertical Ribbon */
        .face::after { width: 100%; height: 24px; left: 0; top: 50%; transform: translateY(-50%); } /* Horizontal Ribbon */

        /* Base Colors (Dynamically changed via CSS variables) */
        :root {
            --box-color-1: #e53935; --box-color-2: #b71c1c; /* Default Red */
        }
        .box-bg {
            background: linear-gradient(135deg, var(--box-color-1), var(--box-color-2));
        }

        /* ================= BASE OF THE BOX ================= */
        .base { width: 160px; height: 140px; position: absolute; bottom: 0; transform-style: preserve-3d; }
        .base .face { width: 160px; height: 140px; }
        .base .face.front  { transform: rotateY(0deg) translateZ(80px); }
        .base .face.back   { transform: rotateY(180deg) translateZ(80px); }
        .base .face.right  { transform: rotateY(90deg) translateZ(80px); }
        .base .face.left   { transform: rotateY(-90deg) translateZ(80px); }
        .base .face.bottom { width: 160px; height: 160px; transform: rotateX(-90deg) translateZ(70px); background: #333; box-shadow: none;}
        .base .face.bottom::before, .base .face.bottom::after { display: none; }
        .base .face.inside { width: 156px; height: 156px; background: #222; transform: rotateX(90deg) translateZ(68px); box-shadow: inset 0 0 50px black;}
        .base .face.inside::before, .base .face.inside::after { display: none; }

        /* ================= LID OF THE BOX ================= */
        .lid {
            width: 164px; height: 40px;
            position: absolute; top: -5px; left: -2px;
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: bottom center;
        }
        .lid .face { height: 40px; width: 164px; }
        .lid .face.top { width: 164px; height: 164px; transform: rotateX(90deg) translateZ(20px); }
        .lid .face.front { transform: rotateY(0deg) translateZ(82px); }
        .lid .face.back { transform: rotateY(180deg) translateZ(82px); }
        .lid .face.right { transform: rotateY(90deg) translateZ(82px); width: 164px; left: 0px;}
        .lid .face.left { transform: rotateY(-90deg) translateZ(82px); width: 164px; left: 0px;}
        
        /* Remove horizontal ribbon from lid sides */
        .lid .face.front::after, .lid .face.back::after, .lid .face.right::after, .lid .face.left::after { display: none; }

        /* 3D Bow on Top */
        .bow {
            position: absolute;
            font-size: 50px;
            transform: translateZ(10px) rotateX(-90deg) rotateY(180deg);
            text-shadow: 0 5px 10px rgba(0,0,0,0.4);
            z-index: 10;
        }

        /* ================= OPEN ANIMATION ================= */
        .scene.open .gift-box {
            animation: none;
            transform: translate(-50%, -50%) rotateX(-10deg) rotateY(-15deg);
        }
        .scene.open .lid {
            transform: translateY(-120px) translateZ(-50px) rotateX(45deg) rotateZ(20deg) scale(0.8);
            opacity: 0;
        }

        /* ================= CONTENT CARD ================= */
        .content-card {
            position: absolute;
            top: 40%; left: 50%;
            width: 300px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 3px #FFD700;
            text-align: center;
            transform: translate(-50%, 0) scale(0.1);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 200;
            pointer-events: none;
        }
        
        .scene.open .content-card {
            transform: translate(-50%, -120%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .sender-name {
            font-size: 1.6rem; font-weight: 800;
            background: linear-gradient(45deg, #ff3366, #ff9933);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .gift-image {
            width: 100%; height: 200px; object-fit: cover;
            border-radius: 12px; margin-bottom: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border: 2px solid #eee;
        }
        .message-text {
            font-size: 1.1rem; color: #444; font-weight: 600;
            background: #fff0f5; padding: 12px; border-radius: 12px;
            border-left: 4px solid #ff3366;
        }

        /* Buttons & Hints */
        .tap-btn {
            position: absolute;
            bottom: 60px;
            background: linear-gradient(45deg, #ff3366, #ff0055);
            color: white; font-size: 1.2rem; font-weight: 600;
            padding: 12px 35px; border-radius: 30px;
            box-shadow: 0 10px 20px rgba(255, 51, 102, 0.4);
            border: 2px solid #FFD700;
            cursor: pointer; z-index: 300;
            animation: pulseBtn 1.5s infinite;
        }
        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .scene.open + .tap-btn { display: none; } /* Hide button when open */

        .footer {
            position: absolute; bottom: 15px;
            color: #d81b60; font-weight: 600; font-size: 0.9rem;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        /* Level Colors via Root Variables update */
        .lvl-1 { --box-color-1: #e53935; --box-color-2: #b71c1c; }
        .lvl-2 { --box-color-1: #1E88E5; --box-color-2: #0D47A1; } /* Blue */
        .lvl-3 { --box-color-1: #43A047; --box-color-2: #1B5E20; } /* Green */
        .lvl-4 { --box-color-1: #8E24AA; --box-color-2: #4A148C; } /* Purple */
        .lvl-5 { --box-color-1: #212121; --box-color-2: #000000; } /* Black Premium */

    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- 3D Scene Wrapper -->
    <div class="scene" id="scene">
        <div class="shadow"></div>

        <!-- Professional Gift Box -->
        <div class="gift-box lvl-1" id="giftBox" onclick="openBox()">
            
            <!-- Base of the box -->
            <div class="base">
                <div class="face front box-bg"></div>
                <div class="face back box-bg"></div>
                <div class="face right box-bg"></div>
                <div class="face left box-bg"></div>
                <div class="face bottom"></div>
                <div class="face inside"></div> <!-- Inside depth -->
            </div>

            <!-- Lid of the box -->
            <div class="lid" id="boxLid">
                <div class="face top box-bg"><div class="bow">🎀</div></div>
                <div class="face front box-bg"></div>
                <div class="face back box-bg"></div>
                <div class="face right box-bg"></div>
                <div class="face left box-bg"></div>
            </div>
            
        </div>

        <!-- Premium Content Card (Pops up from inside) -->
        <div class="content-card">
            <div class="sender-name" id="sender">From: Loading...</div>
            <img class="gift-image" id="giftImg" src="" alt="Gift" referrerpolicy="no-referrer" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4213/4213958.png'">
            <div class="message-text" id="message">...</div>
        </div>
    </div>

    <div class="tap-btn" onclick="openBox()">👉 ओपन करें 👈</div>
    
    <div class="footer">❤️ जोश लव – आपके लिए ❤️</div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB24SehaHDOLuwzTLCkgCwXSpa6dVzrMOw",
            authDomain: "josh-de7d4.firebaseapp.com",
            databaseURL: "https://josh-de7d4-default-rtdb.firebaseio.com",
            projectId: "josh-de7d4",
            storageBucket: "josh-de7d4.firebasestorage.app",
            messagingSenderId: "1036207436233",
            appId: "1:1036207436233:web:59aa121374c9a89d4e3818"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Get ID
        const urlParams = new URLSearchParams(window.location.search);
        const giftId = urlParams.get('id');

        // Load Data
        if (giftId) {
            db.ref('Gifts/' + giftId).once('value').then(snapshot => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('sender').innerText = 'From: ' + (data.sender || 'Secret Admirer');
                    document.getElementById('message').innerText = data.message || 'Surprise! 🎁';

                    if (data.photo && !data.photo.includes('flaticon')) {
                        document.getElementById('giftImg').src = 'https://wsrv.nl/?url=' + encodeURIComponent(data.photo) + '&w=500&output=jpg';
                    } else {
                        document.getElementById('giftImg').src = 'https://cdn-icons-png.flaticon.com/512/4213/4213958.png';
                    }

                    // Set Level Colors (1 to 5 mapping)
                    let level = parseInt(data.boxLevel) || 1;
                    if(level > 5) level = (level % 5) + 1; 
                    document.getElementById('giftBox').className = 'gift-box lvl-' + level;
                }
                hideLoading();
            }).catch(error => {
                console.error('Error:', error);
                hideLoading();
            });
        } else {
            hideLoading();
            document.getElementById('sender').innerText = 'Demo Gift Box';
            document.getElementById('message').innerText = 'You found a premium magic box!';
        }

        function hideLoading() {
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
        }

        let isOpen = false;
        function openBox() {
            if (isOpen) return;
            isOpen = true;

            // Trigger Animation via CSS Class
            document.getElementById('scene').classList.add('open');

            // Sound effect (Optional but adds premium feel)
            // let audio = new Audio('pop-sound-url.mp3'); audio.play();

            // Premium Confetti Burst
            let end = Date.now() + 2000;
            let colors =['#FFD700', '#ff3366', '#ffffff', '#FF69B4'];

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors,
                    zIndex: 1000
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors,
                    zIndex: 1000
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // Big center pop
            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.6 },
                    colors: colors,
                    disableForReducedMotion: true
                });
            }, 300);
        }
    </script>
</body>
</html>
