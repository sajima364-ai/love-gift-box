<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Gift 🎁</title>
    
    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Confetti Animation -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            perspective: 1200px;
        }

        /* 3D Box Container */
        .scene {
            width: 260px; height: 260px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s;
            cursor: pointer;
            margin-top: 60px;
        }

        .cube {
            width: 100%; height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(-30deg);
            transition: transform 1s;
        }

        /* Box Faces */
        .cube__face {
            position: absolute; width: 260px; height: 260px;
            border: 3px solid #b71c1c;
            background: rgba(229, 57, 53, 0.95); /* Red Box */
            box-shadow: inset 0 0 40px rgba(0,0,0,0.3);
        }

        .cube__face--front  { transform: rotateY(  0deg) translateZ(130px); }
        .cube__face--right  { transform: rotateY( 90deg) translateZ(130px); }
        .cube__face--back   { transform: rotateY(180deg) translateZ(130px); }
        .cube__face--left   { transform: rotateY(-90deg) translateZ(130px); }
        .cube__face--top    { transform: rotateX( 90deg) translateZ(130px); background: #c62828; }
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(130px); background: #8e0000; }

        /* Yellow Ribbons */
        .ribbon { position: absolute; background: #FFD700; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        .ribbon-v { width: 50px; height: 100%; left: 105px; top: 0; }
        .ribbon-h { width: 100%; height: 50px; top: 105px; left: 0; }

        /* Lid Opening Animation */
        .scene.open .cube__face--top {
            transform: rotateX(150deg) translateZ(130px);
            opacity: 0.9; transition: transform 1.5s ease-in-out;
        }

        /* The Message Card (Pop-up) */
        .content-card {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(0) scale(0);
            width: 280px; 
            background: white; 
            padding: 20px;
            border-radius: 15px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center; 
            opacity: 0;
            transition: all 1s ease 0.5s; 
            z-index: 100; 
            border: 4px solid #d32f2f;
        }

        /* Card Animation when Open */
        .scene.open .content-card {
            transform: translate(-50%, -130%) translateZ(150px) scale(1);
            opacity: 1;
        }

        /* PHOTO STYLING (Fixed) */
        .content-card img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: contain; 
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            background-color: #fafafa;
        }

        .content-card h3 { margin: 5px 0; color: #d32f2f; font-size: 20px; font-weight: bold; }
        .content-card p { font-size: 16px; color: #333; line-height: 1.4; font-weight: 500; margin-bottom: 5px;}

        /* Loading Screen */
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #d32f2f; font-size: 22px; font-weight: bold; }
        
        /* Tap Instruction */
        .instruction {
            margin-top: 200px; font-size: 1.2rem; color: #fff; text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
            font-weight: bold; animation: bounce 2s infinite;
            background: rgba(211, 47, 47, 0.9); padding: 10px 25px; border-radius: 30px;
            cursor: pointer;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div style="font-size: 50px; margin-bottom: 15px;">🎁</div>
        Opening Gift...
    </div>

    <!-- Background Hearts -->
    <div style="position:absolute; width:100%; height:100%; overflow:hidden; z-index:-1;">
        <div style="position:absolute; top:10%; left:10%; font-size:40px; opacity:0.6; animation: float 6s infinite;">❤️</div>
        <div style="position:absolute; top:20%; right:20%; font-size:30px; opacity:0.4; animation: float 8s infinite;">💖</div>
        <div style="position:absolute; bottom:15%; left:30%; font-size:35px; opacity:0.5; animation: float 7s infinite;">💕</div>
    </div>
    <style>@keyframes float { 0% {transform: translateY(0);} 50% {transform: translateY(-20px);} 100% {transform: translateY(0);} }</style>

    <!-- 3D Box -->
    <div class="scene" id="scene" onclick="openGift()">
        <div class="cube">
            <div class="cube__face cube__face--front"><div class="ribbon ribbon-v"></div><div class="ribbon ribbon-h"></div></div>
            <div class="cube__face cube__face--back"></div>
            <div class="cube__face cube__face--right"></div>
            <div class="cube__face cube__face--left"></div>
            <div class="cube__face cube__face--top"><div class="ribbon ribbon-v"></div><div class="ribbon ribbon-h"></div></div>
            <div class="cube__face cube__face--bottom"></div>
        </div>

        <!-- The Hidden Card -->
        <div class="content-card">
            <h3 id="sender">From: ...</h3>
            
            <!-- Photo (Default agar load na ho) -->
            <img id="giftImg" src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" alt="Gift Photo">
            
            <p id="message">...</p>
        </div>
    </div>

    <div class="instruction" id="tapText">Tap Box to Open! 👆</div>

    <script>
        // ============================================
        // 🔴 1. APNA FIREBASE CONFIG YAHAN PASTE KARO 🔴
        // ============================================
        const firebaseConfig = {
    apiKey: "AIzaSyB24SehaHDOLuwzTLCkgCwXSpa6dVzrMOw",
    authDomain: "josh-de7d4.firebaseapp.com",
    databaseURL: "https://josh-de7d4-default-rtdb.firebaseio.com",
    projectId: "josh-de7d4",
    storageBucket: "josh-de7d4.firebasestorage.app",
    messagingSenderId: "1036207436233",
    appId: "1:1036207436233:web:59aa121374c9a89d4e3818",
    measurementId: "G-BC157TM372"
  };
        // ============================================

        try {
            // Firebase Initialize
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            
            // URL se ID nikalo
            const urlParams = new URLSearchParams(window.location.search);
            const giftId = urlParams.get('id');

            if (giftId) {
                // Database se data mango
                db.ref('Gifts/' + giftId).once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        
                        // 1. Sender Name Set Karo
                        document.getElementById('sender').innerText = "From: " + (data.sender || "Secret Admirer");
                        
                        // 2. Message Set Karo
                        document.getElementById('message').innerText = data.message || "Sent you a surprise! ❤️";
                        
                        // 3. PHOTO LOGIC (YEH HAI MAIN FIX)
                        const imgEl = document.getElementById('giftImg');
                        
                        if (data.photo && data.photo.length > 10) {
                            let cleanUrl = data.photo;
                            
                            // FORCE HTTPS: Agar link http hai, to use https banao
                            if (cleanUrl.startsWith("http://")) {
                                cleanUrl = cleanUrl.replace("http://", "https://");
                            }
                            
                            console.log("Loading Image: " + cleanUrl); // Debugging ke liye
                            imgEl.src = cleanUrl;
                        } else {
                            // Agar photo nahi hai, to default dikhao (Chupao mat)
                            imgEl.src = "https://cdn-icons-png.flaticon.com/512/4213/4213958.png";
                        }
                        
                        // Loading Hatao
                        document.getElementById('loading').style.display = 'none';
                        
                    } else {
                        // Agar Gift ID galat hai
                        document.getElementById('loading').innerHTML = "<h3>Gift Not Found! ❌</h3>";
                    }
                }).catch(e => {
                    console.error(e);
                    document.getElementById('loading').innerText = "Connection Error!";
                });
            } else {
                // Demo Mode
                document.getElementById('loading').style.display = 'none';
                document.getElementById('sender').innerText = "From: Josh App";
                document.getElementById('message').innerText = "Create your own gift in the App!";
            }
        } catch (e) {
            alert("⚠️ Firebase Config Error! Please check index.html file.");
        }

        // --- Animation Logic ---
        let opened = false;
        function openGift() {
            if (opened) return;
            opened = true;
            
            document.getElementById('scene').classList.add('open');
            document.getElementById('tapText').style.display = 'none';

            // Confetti Blast (Patakhe)
            var end = Date.now() + (3 * 1000);
            (function frame() {
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
