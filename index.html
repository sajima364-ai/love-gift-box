<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Magic Gift ❤️</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Confetti Effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            perspective: 1200px;
        }

        /* 3D Box Styles */
        .scene {
            width: 250px; height: 250px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s;
            cursor: pointer;
            margin-top: 50px;
        }

        .cube {
            width: 100%; height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(-30deg);
            transition: transform 1s;
        }

        .cube__face {
            position: absolute; width: 250px; height: 250px;
            border: 2px solid #b71c1c;
            background: rgba(211, 47, 47, 0.95);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        .cube__face--front  { transform: rotateY(  0deg) translateZ(125px); }
        .cube__face--right  { transform: rotateY( 90deg) translateZ(125px); }
        .cube__face--back   { transform: rotateY(180deg) translateZ(125px); }
        .cube__face--left   { transform: rotateY(-90deg) translateZ(125px); }
        .cube__face--top    { transform: rotateX( 90deg) translateZ(125px); background: #c62828; }
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(125px); background: #8e0000; }

        /* Ribbons */
        .ribbon { position: absolute; background: #FFD700; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
        .ribbon-v { width: 50px; height: 100%; left: 100px; top: 0; }
        .ribbon-h { width: 100%; height: 50px; top: 100px; left: 0; }

        /* Open Animation */
        .scene.open .cube__face--top {
            transform: rotateX(150deg) translateZ(125px);
            opacity: 0.8; transition: transform 1s;
        }

        /* The Card inside (Message & Photo) */
        .content-card {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(0) scale(0);
            width: 280px; 
            background: white; 
            padding: 15px;
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center; 
            opacity: 0;
            transition: all 1s ease 0.5s; 
            z-index: 100; 
            border: 4px solid #d32f2f;
        }

        .scene.open .content-card {
            transform: translate(-50%, -130%) translateZ(150px) scale(1);
            opacity: 1;
        }

        /* IMAGE FIX - SABSE IMPORTANT PART */
        .content-card img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 250px; /* Limit height */
            object-fit: contain; /* Photo katega nahi */
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            background-color: #fff;
        }

        .content-card h3 { margin: 5px 0; color: #d32f2f; font-size: 18px; font-weight: bold; }
        .content-card p { font-size: 16px; color: #333; line-height: 1.4; font-weight: 500;}

        /* Loading Screen */
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #d32f2f; font-size: 20px; font-weight: bold; }
        
        .instruction {
            margin-top: 180px; font-size: 1.2rem; color: #d32f2f;
            font-weight: bold; animation: bounce 2s infinite;
            background: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 30px;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    </style>
</head>
<body>

    <div id="loading">
        <div style="font-size: 40px; margin-bottom: 10px;">🎁</div>
        Loading Gift...
    </div>

    <!-- Background Decoration -->
    <div style="position:absolute; width:100%; height:100%; overflow:hidden; z-index:-1;">
        <div style="position:absolute; top:10%; left:10%; font-size:30px; opacity:0.5;">❤️</div>
        <div style="position:absolute; top:20%; right:20%; font-size:40px; opacity:0.3;">💖</div>
        <div style="position:absolute; bottom:10%; left:20%; font-size:35px; opacity:0.4;">💕</div>
    </div>

    <!-- The 3D Box -->
    <div class="scene" id="scene" onclick="openGift()">
        <div class="cube">
            <div class="cube__face cube__face--front"><div class="ribbon ribbon-v"></div><div class="ribbon ribbon-h"></div></div>
            <div class="cube__face cube__face--back"></div>
            <div class="cube__face cube__face--right"></div>
            <div class="cube__face cube__face--left"></div>
            <div class="cube__face cube__face--top"><div class="ribbon ribbon-v"></div><div class="ribbon ribbon-h"></div></div>
            <div class="cube__face cube__face--bottom"></div>
        </div>

        <!-- The Message Card -->
        <div class="content-card">
            <h3 id="sender">From: ...</h3>
            
            <!-- Photo Area -->
            <img id="giftImg" src="" alt="Gift Photo" onerror="this.style.display='none'">
            
            <p id="message">...</p>
        </div>
    </div>

    <div class="instruction" id="tapText">Tap Box to Open! 👆</div>

    <script>
        // ============================================
        // 🔴 APNA FIREBASE CONFIG YAHAN DALO
        // ============================================
        const firebaseConfig = {
    apiKey: "AIzaSyB24SehaHDOLuwzTLCkgCwXSpa6dVzrMOw",
    authDomain: "josh-de7d4.firebaseapp.com",
    databaseURL: "https://josh-de7d4-default-rtdb.firebaseio.com",
    projectId: "josh-de7d4",
    storageBucket: "josh-de7d4.firebasestorage.app",
    messagingSenderId: "1036207436233",
    appId: "1:1036207436233:web:59aa121374c9a89d4e3818",
    measurementId: "G-BC157TM372"
  };
        // ============================================

        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            
            // Get ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const giftId = urlParams.get('id');

            if (giftId) {
                db.ref('Gifts/' + giftId).once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        
                        // 1. Set Sender Name
                        document.getElementById('sender').innerText = "From: " + (data.sender || "Secret");
                        
                        // 2. Set Message
                        document.getElementById('message').innerText = data.message || "Surprise!";
                        
                        // 3. Set Photo (With Security Fix)
                        const imgEl = document.getElementById('giftImg');
                        if (data.photo && data.photo.length > 5) {
                            // ImgBB fix: ensure https
                            let safeUrl = data.photo;
                            if (safeUrl.startsWith('http://')) {
                                safeUrl = safeUrl.replace('http://', 'https://');
                            }
                            imgEl.src = safeUrl;
                        } else {
                            // No photo provided
                            imgEl.style.display = 'none';
                        }
                        
                        document.getElementById('loading').style.display = 'none';
                    } else {
                        document.getElementById('loading').innerHTML = "<h3>Gift Expired or Wrong Link! ❌</h3>";
                    }
                }).catch(e => {
                    console.error(e);
                    document.getElementById('loading').innerText = "Error Loading Gift!";
                });
            } else {
                // Demo Mode (Jab bina ID ke website khule)
                document.getElementById('loading').style.display = 'none';
                document.getElementById('sender').innerText = "From: Josh App";
                document.getElementById('message').innerText = "Please create a link from the App!";
                document.getElementById('giftImg').src = "https://cdn-icons-png.flaticon.com/512/4213/4213958.png";
            }
        } catch (e) {
            alert("Firebase Config Error! Please check index.html code.");
        }

        // Animation Logic
        let opened = false;
        function openGift() {
            if (opened) return;
            opened = true;
            
            document.getElementById('scene').classList.add('open');
            document.getElementById('tapText').style.display = 'none';

            // Confetti
            var end = Date.now() + (3 * 1000);
            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
